services:

  # MongoDB
  # DELTIS_INSTANCE / *_PORT / DELTIS_IMAGE are read from the .env file next to
  # this compose file. Defaults keep the original single-instance names, so an
  # existing deployment keeps its containers and volume without any .env file.
  # A second instance on the same host (e.g. beta) sets its own values, see
  # docs/DEPLOYMENT.md.
  mongo:
    image: mongo:7
    container_name: ${DELTIS_INSTANCE:-deltis}-mongo
    volumes:
      - mongo_data:/data/db
    ports:
      # SECURITY: bound to localhost by default. Docker-published ports bypass
      # host firewalls (ufw), and an internet-reachable, unauthenticated
      # MongoDB WILL be found and wiped by ransom bots. The app reaches mongo
      # over the internal compose network; backup.sh/restore.sh use `docker
      # exec` — nothing needs this port from outside the host. Only override
      # MONGO_BIND if you fully understand the exposure.
      - "${MONGO_BIND:-127.0.0.1}:${MONGO_PORT:-27017}:27017"
    environment:
      # Optional root credentials — only applied when BOTH are set AND the
      # data volume is empty (first initialization). See docs/DEPLOYMENT.md
      # "Securing MongoDB" for enabling auth on an existing instance.
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # App (Express + pre-built React frontend)
  app:
    build: .
    image: ${DELTIS_IMAGE:-deltis:latest}
    container_name: ${DELTIS_INSTANCE:-deltis}-app
    ports:
      - "${APP_PORT:-3001}:3001"
    volumes:
      # Mount backups dir so backup.sh and restore.sh can access it from the host
      # (also carries update-state.json and update logs across container swaps)
      - ./backups:/app/backups
      # Mount pepper file read-only into the container
      - /etc/deltis/:/etc/deltis/
      # Uncomment to enable full in-app OTA updates (docker-socket mode):
      # the app pulls the new image and swaps its own container, with automatic
      # recovery on failure. See docs/UPDATES.md.
      # - /var/run/docker.sock:/var/run/docker.sock
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      # Override MONGODB_URI from .env.production – inside the container
      # MongoDB is reachable via the service name 'mongo', not localhost.
      # With mongo auth enabled, set DELTIS_MONGODB_URI in .env to
      # mongodb://USER:PASSWORD@mongo:27017/deltis?authSource=admin
      MONGODB_URI: ${DELTIS_MONGODB_URI:-mongodb://mongo:27017/deltis}
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mongo_data:
    # Instance-scoped volume name – two instances on one host must never share
    # the same MongoDB data directory.
    name: ${DELTIS_INSTANCE:-deltis}-mongo-data
