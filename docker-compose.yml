services:

  # MongoDB
  # DELTIS_INSTANCE / *_PORT / DELTIS_IMAGE are read from the .env file next to
  # this compose file. Defaults keep the original single-instance names, so an
  # existing deployment keeps its containers and volume without any .env file.
  # A second instance on the same host (e.g. beta) sets its own values, see
  # docs/DEPLOYMENT.md.
  mongo:
    image: mongo:7
    container_name: ${DELTIS_INSTANCE:-habit-tracker}-mongo
    volumes:
      - mongo_data:/data/db
    ports:
      - "${MONGO_PORT:-27017}:27017"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # App (Express + pre-built React frontend)
  app:
    build: .
    image: ${DELTIS_IMAGE:-habit-tracker:latest}
    container_name: ${DELTIS_INSTANCE:-habit-tracker}-app
    ports:
      - "${APP_PORT:-3001}:3001"
    volumes:
      # Mount backups dir so backup.sh and restore.sh can access it from the host
      # (also carries update-state.json and update logs across container swaps)
      - ./backups:/app/backups
      # Mount pepper file read-only into the container
      - /etc/deltis/:/etc/deltis/
      # Uncomment to enable full in-app OTA updates (docker-socket mode):
      # the app pulls the new image and swaps its own container, with automatic
      # recovery on failure. See docs/UPDATES.md.
      # - /var/run/docker.sock:/var/run/docker.sock
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      # Override MONGODB_URI from .env.production – inside the container
      # MongoDB is reachable via the service name 'mongo', not localhost.
      MONGODB_URI: mongodb://mongo:27017/habit_tracker
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mongo_data:
    # Instance-scoped volume name – two instances on one host must never share
    # the same MongoDB data directory.
    name: ${DELTIS_INSTANCE:-habit-tracker}-mongo-data
