services:

  # ── MongoDB ────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: habit-tracker-mongo
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── App (Express + pre-built React frontend) ──────────────────────────────
  app:
    build: .
    image: habit-tracker:latest
    container_name: habit-tracker-app
    ports:
      - "3001:3001"
    volumes:
      # Mount backups dir so backup.sh and restore.sh can access it from the host
      - ./backups:/app/backups
      # Mount pepper file read-only into the container
      - /etc/deltis/:/etc/deltis/
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      # Override MONGODB_URI from .env.production – inside the container
      # MongoDB is reachable via the service name 'mongo', not localhost.
      MONGODB_URI: mongodb://mongo:27017/habit_tracker
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mongo_data:
    name: habit-tracker-mongo-data
