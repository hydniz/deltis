name: CD – Deploy to Production

# Only triggers when commits land on main (via PR merge or direct push).
# Tests run first; deploy is skipped if any test fails.
on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install server dependencies
        run: npm ci

      - name: Install client dependencies
        run: npm ci --prefix client

      - name: Run backend tests
        run: npm test

      - name: Run frontend tests
        run: npm test --prefix client

  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: test
    environment: production   # optional: add manual approval gate in GitHub settings
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t habit-tracker:latest .

      - name: Export image as tar archive
        run: docker save habit-tracker:latest | gzip > habit-tracker-deploy.tar.gz

      - name: Copy files to server (SCP)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "habit-tracker-deploy.tar.gz,docker-compose.yml,backup.sh,restore.sh"
          target: ${{ secrets.TARGET_DIR }}
          overwrite: true

      - name: Backup, load image and restart (SSH)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.TARGET_DIR }}

            chmod +x ./backup.sh ./restore.sh

            if docker container inspect habit-tracker-mongo >/dev/null 2>&1; then
              echo "Running pre-deploy backup..."
              BACKUP_FILE="predeploy_$(date +%Y%m%d_%H%M%S).archive.gz"
              docker exec habit-tracker-mongo mongodump \
                --db habit_tracker \
                --archive=/tmp/pre_deploy.archive \
                --gzip --quiet
              docker cp habit-tracker-mongo:/tmp/pre_deploy.archive "./$BACKUP_FILE"
              docker exec habit-tracker-mongo rm /tmp/pre_deploy.archive
              ls -1t predeploy_*.archive.gz 2>/dev/null | tail -n +6 | xargs rm -f
              echo "Backup: $BACKUP_FILE"
            else
              echo "First deploy – skipping backup."
            fi

            docker load < habit-tracker-deploy.tar.gz
            rm habit-tracker-deploy.tar.gz
            docker compose up -d --no-build --force-recreate

            echo "Deploy successful!"
