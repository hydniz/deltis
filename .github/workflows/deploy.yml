name: CD – Deploy (reusable)

# Reusable deploy pipeline shared by deploy-beta.yml and deploy-production.yml.
# Authentication is SSH-key-only (secrets.SERVER_SSH_KEY) – no passwords.
#
# Secrets are scoped to the GitHub Environment passed via `environment`
# (Settings → Environments → beta / production):
#   SERVER_HOST, SERVER_USER, SERVER_SSH_KEY, TARGET_DIR
# Both environments may point at the same host (different TARGET_DIRs) or at
# two separate hosts – the pipeline does not care.

on:
  workflow_call:
    inputs:
      environment:
        description: 'GitHub Environment to deploy to (beta | production)'
        required: true
        type: string
      image_ref:
        description: 'Full image ref to build and deploy (e.g. habit-tracker:v1.2.3)'
        required: true
        type: string
      tag_prefix:
        description: 'Image tag prefix owned by this instance (used for pruning old images)'
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install server dependencies
        run: npm ci

      - name: Install client dependencies
        run: npm ci --prefix client

      - name: Run backend tests
        run: npm test

      - name: Run frontend tests
        run: npm test --prefix client

  build-and-deploy:
    name: Build & Deploy (${{ inputs.environment }})
    runs-on: ubuntu-latest
    needs: test
    environment: ${{ inputs.environment }}   # optional: add manual approval gate in GitHub settings
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            --build-arg GIT_COMMIT=$(git rev-parse --short HEAD) \
            -t '${{ inputs.image_ref }}' .

      - name: Export image as tar archive
        run: docker save '${{ inputs.image_ref }}' | gzip > deltis-deploy.tar.gz

      - name: Copy files to server (SCP)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "deltis-deploy.tar.gz,docker-compose.yml,backup.sh,restore.sh,rollback.sh,scripts/deploy-remote.sh"
          target: ${{ secrets.TARGET_DIR }}
          overwrite: true

      - name: Backup, load image and restart (SSH)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.TARGET_DIR }}
            chmod +x ./backup.sh ./restore.sh ./rollback.sh ./scripts/deploy-remote.sh
            bash scripts/deploy-remote.sh deltis-deploy.tar.gz '${{ inputs.image_ref }}' '${{ inputs.tag_prefix }}'
