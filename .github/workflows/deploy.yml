name: Deploy Habit Tracker

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Docker Image bauen
        run: |
          docker build -t habit-tracker:latest .

      - name: Image als Tar-Archiv exportieren
        run: |
          docker save habit-tracker:latest | gzip > habit-tracker-deploy.tar.gz

      - name: Dateien auf den Server kopieren (SCP)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "habit-tracker-deploy.tar.gz,docker-compose.yml,backup.sh,restore.sh"
          target: ${{ secrets.TARGET_DIR }}
          overwrite: true

      - name: Backup, Image laden und neu starten (SSH)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.TARGET_DIR }}

            # Skripte ausführbar machen
            chmod +x ./backup.sh ./restore.sh

            # Backups-Verzeichnis sicherstellen (für Volume-Mount und Lock-Datei)
            mkdir -p backups

            # Backup nur wenn MongoDB bereits läuft (kein Backup beim ersten Deploy)
            if docker container inspect habit-tracker-mongo >/dev/null 2>&1; then
              echo "Führe Backup vor dem Deploy aus..."
              ./backup.sh
            else
              echo "Erster Deploy – kein Backup nötig."
            fi

            # Neues Image laden
            docker load < habit-tracker-deploy.tar.gz

            # Container mit neuem Image starten
            docker compose up -d

            # Tar-Archiv aufräumen
            rm habit-tracker-deploy.tar.gz

            echo "Deploy erfolgreich!"
