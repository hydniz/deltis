name: Deploy Habit Tracker

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t habit-tracker:latest .

      - name: Export image as tar archive
        run: docker save habit-tracker:latest | gzip > habit-tracker-deploy.tar.gz

      - name: Copy files to server (SCP)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "habit-tracker-deploy.tar.gz,docker-compose.yml,backup.sh,restore.sh"
          target: ${{ secrets.TARGET_DIR }}
          overwrite: true

      - name: Backup, load image and restart (SSH)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.TARGET_DIR }}

            chmod +x ./backup.sh ./restore.sh

            # Ensure backups directory exists with correct ownership.
            # Docker creates bind-mount directories as root if they don't exist,
            # which would make them unwritable by the SSH user.
            mkdir -p backups
            chmod u+w backups 2>/dev/null || true

            # Pre-deploy backup via docker exec to avoid host permission issues.
            # No lock file needed here – containers are restarted immediately after.
            if docker container inspect habit-tracker-mongo >/dev/null 2>&1; then
              echo "Running pre-deploy backup..."
              BACKUP_FILE="backups/habit_tracker_deploy_$(date +%Y%m%d_%H%M%S).archive.gz"
              docker exec habit-tracker-mongo mongodump \
                --db habit_tracker \
                --archive=/tmp/pre_deploy.archive \
                --gzip --quiet
              docker cp habit-tracker-mongo:/tmp/pre_deploy.archive "$BACKUP_FILE"
              docker exec habit-tracker-mongo rm /tmp/pre_deploy.archive
              echo "Backup: $BACKUP_FILE"
            else
              echo "First deploy – skipping backup."
            fi

            # Load new image
            docker load < habit-tracker-deploy.tar.gz
            rm habit-tracker-deploy.tar.gz

            # Force-recreate containers so the new image is actually used.
            # --no-build: don't try to build (source code is not on the server)
            # --force-recreate: replace running containers even if config looks unchanged
            docker compose up -d --no-build --force-recreate

            echo "Deploy successful!"
