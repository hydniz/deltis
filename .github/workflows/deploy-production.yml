name: CD – Deploy Production

# A stable release tag (plain semver, no -beta/-alpha suffix) deploys to
# production. This matches the OTA 'stable' channel convention in
# server/routes/update.js (channelTagRegex).

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'   # v1.2.3 – suffixed tags (v1.2.3-beta.1) do NOT match

jobs:
  # Refuse to ship a build whose package.json was not bumped to the tag —
  # such a deploy would run fine but self-report the previous version
  # (v0.5.5/v0.5.6 both shipped reporting 0.5.4 this way).
  verify-version:
    name: Verify tag matches package.json
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Verify tag matches package.json versions
        run: node scripts/verify-release-version.js "${{ github.ref_name }}"

  deploy:
    name: Deploy
    needs: verify-version
    uses: ./.github/workflows/deploy.yml
    with:
      environment: production
      image_ref: deltis:${{ github.ref_name }}
      tag_prefix: v
    secrets: inherit
