name: Create GitHub Release

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          npm ci --prefix client

      - name: Run tests
        run: |
          npm run server:test
          npm run client:test

  create-release:
    name: Build & Release Assets
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            --build-arg GIT_COMMIT=$(git rev-parse --short HEAD) \
            -t habit-tracker:${{ github.ref_name }} .

      - name: Prepare release assets
        run: |
          mkdir release

          # Save the versioned app image as a tar.gz
          docker save habit-tracker:${{ github.ref_name }} \
            | gzip > release/habit-tracker-${{ github.ref_name }}.tar.gz

          # Generate a release-ready docker-compose.yml:
          #   - remove "build: ." so no source code is needed
          #   - pin the image to the released version tag
          sed \
            -e '/^\s*build:/d' \
            -e 's|image: habit-tracker:latest|image: habit-tracker:${{ github.ref_name }}|g' \
            docker-compose.yml > release/docker-compose.yml

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/habit-tracker-${{ github.ref_name }}.tar.gz
            release/docker-compose.yml
          body: |
            ## Installation

            1. Lade beide Dateien herunter.
            2. Lade das Docker-Image:
               ```sh
               docker load < habit-tracker-${{ github.ref_name }}.tar.gz
               ```
            3. Erstelle eine `.env.production`-Datei (Vorlage im Repository).
            4. Starte die Anwendung:
               ```sh
               docker compose up -d
               ```
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
